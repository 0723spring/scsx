<!--
前端主页面文件。

文件职责：
1. 页面标题：基于 OCR 的快递面单信息识别与隐私保护系统。
2. 图片上传区域。
3. 原图预览区域。
4. 开始识别按钮。
5. 识别状态提示区域。
6. 结构化字段展示区域：
   - 收件人
   - 手机号
   - 地址
   - 快递单号
7. OCR 完整文本展示区域。
8. 脱敏图片展示区域。
9. 引入 style.css 和 app.js。
10. 页面保持单页结构，不引入复杂前端框架。
-->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快递面单信息识别与隐私保护系统</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <h1>快递面单信息识别与隐私保护系统</h1>
        <p>图片上传、OCR 识别、字段提取与隐私脱敏展示</p>
      </div>
      <span id="serviceStatus" class="status-pill">检查服务中</span>
    </header>

    <section id="mainView" class="app-view">
    <section class="workspace">
      <section class="panel upload-panel">
        <div class="panel-header">
          <h2>面单上传</h2>
          <button id="recognizeBtn" class="primary-btn" disabled>开始识别</button>
        </div>

        <label class="upload-box" for="fileInput">
          <input id="fileInput" type="file" accept="image/*">
          <span>选择快递面单图片</span>
        </label>

        <label class="option-toggle" for="enablePreprocess">
          <input id="enablePreprocess" type="checkbox">
          <span>图像校正</span>
        </label>

        <div class="preview-frame">
          <img id="sourcePreview" alt="原图预览">
          <p id="emptyPreview">尚未选择图片</p>
        </div>
      </section>

      <section class="panel result-panel">
        <div class="panel-header">
          <h2>识别结果</h2>
          <span id="recognitionStatus" class="muted">等待上传</span>
        </div>

        <dl class="field-grid">
          <div>
            <dt>收件人</dt>
            <dd id="receiverName">-</dd>
          </div>
          <div>
            <dt>手机号</dt>
            <dd id="receiverPhone">-</dd>
          </div>
          <div>
            <dt>快递单号</dt>
            <dd id="trackingNumber">-</dd>
          </div>
          <div>
            <dt>耗时</dt>
            <dd id="processingTime">-</dd>
          </div>
        </dl>

        <div class="address-block">
          <span>地址</span>
          <p id="receiverAddress">-</p>
        </div>

        <section id="preprocessPanel" class="preprocess-panel is-hidden" aria-live="polite">
          <div>
            <span>校正状态</span>
            <strong id="preprocessStatus">-</strong>
          </div>
          <div>
            <span>旋转角度</span>
            <strong id="preprocessAngle">-</strong>
          </div>
          <p id="preprocessMessage">-</p>
        </section>

        <div class="action-bar">
          <button id="viewOcrBtn" class="secondary-btn" type="button" disabled>查看 OCR 文本</button>
          <button id="viewMaskedBtn" class="secondary-btn" type="button" disabled>查看脱敏图片</button>
          <button id="copyResultBtn" class="secondary-btn" type="button" disabled>复制结果</button>
          <button id="downloadMaskedBtn" class="secondary-btn" type="button" disabled>下载脱敏图</button>
          <button id="exportJsonBtn" class="secondary-btn" type="button" disabled>导出 JSON</button>
          <button id="clearBtn" class="ghost-btn" type="button" disabled>清空</button>
        </div>
      </section>
    </section>
    </section>

    <section id="ocrView" class="app-view detail-view is-hidden">
      <div class="detail-toolbar">
        <button id="backFromOcrBtn" class="ghost-btn" type="button">返回识别结果</button>
      </div>
      <section class="panel detail-panel">
        <div class="panel-header detail-header">
          <h2>OCR 文本</h2>
          <span class="muted">展示后端返回的完整 OCR 原文</span>
        </div>
        <ul id="ocrList" class="ocr-list">
          <li>暂无 OCR 文本</li>
        </ul>
      </section>
    </section>

    <section id="maskedView" class="app-view detail-view is-hidden">
      <div class="detail-toolbar">
        <button id="backFromMaskedBtn" class="ghost-btn" type="button">返回识别结果</button>
      </div>
      <section class="panel detail-panel">
        <div class="panel-header detail-header">
          <h2>脱敏图片</h2>
          <span class="muted">查看已遮挡敏感信息的图片</span>
        </div>
        <div class="preview-frame masked-frame">
          <img id="maskedPreview" alt="脱敏图片预览">
          <p id="emptyMasked">识别后显示脱敏图片</p>
        </div>
      </section>

      <section id="preprocessedPanel" class="panel preprocessed-panel detail-panel is-hidden">
        <div class="panel-header">
          <h2>校正图片</h2>
        </div>
        <div class="preview-frame compact-frame">
          <img id="preprocessedPreview" alt="校正图片预览">
          <p id="emptyPreprocessed">启用后显示校正图片</p>
        </div>
      </section>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
